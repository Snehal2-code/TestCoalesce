        join:
          joinCondition: |-
            FROM {{ ref('SRC', 'CUSTOMER') }} "CUSTOMER"
            FROM fact_orders fo

            LEFT JOIN dim_customer dc
              ON fo.customer_id = dc.customer_id
             AND dc.is_active = 'Y'
             AND COALESCE(dc.deleted_flag, 'N') = 'N'
             AND dc.customer_type IN ('RETAIL', 'CORPORATE')

            LEFT JOIN dim_customer_address dca
              ON dc.customer_id = dca.customer_id
             AND dca.address_type = 'PRIMARY'
             AND dca.is_current = 'Y'

            LEFT JOIN dim_product dp
              ON fo.product_id = dp.product_id
             AND dp.current_flag = 'Y'
             AND dp.product_status <> 'DISCONTINUED'

            LEFT JOIN dim_product_category dpc
              ON dp.category_id = dpc.category_id
             AND dpc.is_active = 'Y'

            LEFT JOIN dim_product_subcategory dpsc
              ON dp.subcategory_id = dpsc.subcategory_id
             AND dpsc.category_id = dpc.category_id

            LEFT JOIN dim_supplier dsup
              ON dp.supplier_id = dsup.supplier_id
             AND dsup.approved_flag = 'Y'

            LEFT JOIN dim_date dd_order
              ON fo.order_date = dd_order.calendar_date

            LEFT JOIN dim_date dd_ship
              ON fo.ship_date = dd_ship.calendar_date

            LEFT JOIN dim_date dd_delivery
              ON fo.delivery_date = dd_delivery.calendar_date

            LEFT JOIN dim_sales_rep dsr
              ON fo.sales_rep_id = dsr.sales_rep_id
             AND dsr.active_flag = 'Y'
             AND dsr.termination_date IS NULL

            LEFT JOIN dim_sales_team dst
              ON dsr.sales_team_id = dst.sales_team_id
             AND dst.team_status = 'ACTIVE'

            LEFT JOIN dim_region dr
              ON dst.region_code = dr.region_code
             AND dr.is_enabled = 'Y'

            LEFT JOIN dim_country dct
              ON dr.country_code = dct.country_code
             AND dct.is_supported = 'Y'

            LEFT JOIN dim_currency dcur
              ON fo.currency_code = dcur.currency_code
             AND dcur.is_default = 'Y'

            LEFT JOIN dim_exchange_rate der
              ON fo.currency_code = der.from_currency
             AND der.to_currency = 'USD'
             AND fo.order_date BETWEEN der.valid_from AND der.valid_to

            LEFT JOIN dim_channel dch
              ON fo.channel_id = dch.channel_id
             AND UPPER(dch.channel_type) IN ('ONLINE', 'RETAIL', 'PARTNER')

            LEFT JOIN dim_marketing_campaign dmc
              ON fo.campaign_id = dmc.campaign_id
             AND dmc.start_date <= fo.order_date
             AND dmc.end_date >= fo.order_date

            LEFT JOIN dim_promotion dpromo
              ON fo.promo_id = dpromo.promo_id
             AND dpromo.is_active = 'Y'
             AND dpromo.discount_percent > 0

            LEFT JOIN dim_coupon dcoup
              ON dpromo.coupon_code = dcoup.coupon_code
             AND dcoup.is_redeemable = 'Y'

            LEFT JOIN dim_payment_method dpm
              ON fo.payment_method_id = dpm.payment_method_id
             AND dpm.is_enabled = 'Y'
             AND dpm.method_type <> 'DEPRECATED'

            LEFT JOIN dim_payment_provider dpp
              ON dpm.provider_id = dpp.provider_id
             AND dpp.provider_status = 'ACTIVE'

            LEFT JOIN dim_shipping_method dsm
              ON fo.shipping_method_id = dsm.shipping_method_id
             AND dsm.is_available = 'Y'

            LEFT JOIN dim_carrier dcar
              ON dsm.carrier_id = dcar.carrier_id
